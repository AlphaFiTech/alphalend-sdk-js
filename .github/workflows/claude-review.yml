name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]
  # Manual trigger: comment "@claude" on a PR to (re-)run the review on demand.
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    # Run on PR open/sync, OR on a PR comment that mentions @claude.
    # Skip bot-authored events (e.g. dependabot, and Claude's own automation).
    if: >-
      github.event.sender.type != 'Bot' &&
      (
        github.event_name == 'pull_request' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body, '@claude')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      # Works for both pull_request (event.pull_request.number) and
      # issue_comment (event.issue.number) triggers.
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # For comment-triggered runs the default checkout is the base branch, so
      # explicitly check out the PR head to match the diff and working tree.
      - name: Check out PR branch (comment trigger)
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout "$PR_NUMBER"
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/obra/superpowers-marketplace.git"
          plugins: "superpowers@superpowers-marketplace"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            Review the changes using the superpowers code-review skill
            (/superpowers:requesting-code-review). Check correctness, security,
            error handling, test coverage, and this repo's CLAUDE.md conventions.
            The PR branch is already checked out in the working directory.

            FIRST load the prior review so you do not repeat yourself:
            - Existing PR comments:
              `gh pr view ${{ env.PR_NUMBER }} --comments`
            - Your earlier inline review comments:
              `gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/comments --paginate`
            From the current diff and code, determine which earlier findings are
            now FIXED and which are still open.

            THEN post ONLY:
            - genuinely NEW issues, and
            - earlier issues that are still unresolved and not already commented.
            Never repost a finding that already has an equivalent existing comment,
            and never re-raise an earlier comment's issue that is now fixed. For
            specific lines use `mcp__github_inline_comment__create_inline_comment`
            (with `confirmed: true`), after checking there is not already an
            equivalent inline comment on that line.

            Maintain ONE sticky summary comment whose body starts with the marker
            `<!-- claude-review-summary -->`. Find it via
            `gh api repos/${{ github.repository }}/issues/${{ env.PR_NUMBER }}/comments --paginate`;
            if it exists, UPDATE it in place with
            `gh api --method PATCH repos/${{ github.repository }}/issues/comments/<id> -f body=@-`;
            otherwise create it with `gh pr comment`. The summary must have three
            sections ranked by severity: New, Still open, Resolved since last review.
            Only post GitHub comments — do not submit the review as a chat message.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*),Bash(gh pr checkout:*)"
