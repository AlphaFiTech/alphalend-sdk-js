# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-merge-conflict

  # JavaScript/TypeScript specific hooks
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: ./node_modules/.bin/prettier
        language: system
        files: \.(js|jsx|ts|tsx|json|md|yml|yaml)$
        args: ["--write"]

      - id: eslint
        name: ESLint
        entry: ./node_modules/.bin/eslint
        language: system
        files: \.(ts|tsx)$
        args: ["--fix"]

  # TypeScript type checking
  - repo: local
    hooks:
      - id: typescript-check
        name: TypeScript Type Check
        entry: ./node_modules/.bin/tsc --noEmit
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false

      - id: build-check
        name: Build Check
        entry: npm run build
        language: system
        pass_filenames: false

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

# Global configuration
default_language_version:
  node: 20.11.0
